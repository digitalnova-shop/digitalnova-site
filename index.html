<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigitalNova</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0D1117;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: #111827;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: #00C8FF;
}

.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 28px;
}

.btn {
  display: inline-block;
  padding: 12px 18px;
  margin-top: 15px;
  background: #00E676;
  color: black;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
}

.products {
  padding: 20px;
  text-align: center;
}

.card {
  background: #111827;
  margin: 15px auto;
  padding: 15px;
  border-radius: 10px;
  max-width: 320px;
}

.price {
  color: #00E676;
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111827;
  color: gray;
  margin-top: 30px;
}
</style>

</head>

<body>

<header>
  <div class="logo">DigitalNova</div>
</header>

<section class="hero">
  <h1>Produits numériques premium</h1>
  <p>Templates, IA, TikTok, YouTube, productivité</p>
  <a class="btn" href="#products">Voir les produits</a>
</section>

<section class="products" id="products">

  <div class="card">
    <h3>Pack Prompts ChatGPT</h3>
    <p class="price">14,99 €</p>
    <a class="btn" href="TON-LIEN-STRIPE">Acheter</a>
  </div>

  <div class="card">
    <h3>Pack Canva Réseaux Sociaux</h3>
    <p class="price">19,99 €</p>
    <a class="btn" href="TON-LIEN-STRIPE">Acheter</a>
  </div>

  <div class="card">
    <h3>Kit TikTok Viral</h3>
    <p class="price">24,99 €</p>
    <a class="btn" href="TON-LIEN-STRIPE">Acheter</a>
  </div>

</section>

<footer>
  DigitalNova • Paiement sécurisé • Téléchargement instantané
</footer>

</body>
</html>
